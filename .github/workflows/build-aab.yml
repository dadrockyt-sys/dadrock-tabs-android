name: Build Signed AAB

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version Code (must be higher than last Play Store upload)'
        required: true
        default: '41'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11.1'
      
      - name: Update Version Code
        working-directory: android-app
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" app/build.gradle
          echo "✅ Version code set to ${{ github.event.inputs.version_code }}"
          grep -E "versionCode|versionName" app/build.gradle
      
      - name: Decode Keystore
        working-directory: android-app
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks
          echo "✅ Keystore decoded"
      
      - name: Build Signed Release AAB
        working-directory: android-app
        run: |
          gradle bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          echo "✅ Signed AAB built successfully"
      
      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: DadRockTabs-v${{ github.event.inputs.version_code }}-signed
          path: android-app/app/build/outputs/bundle/release/*.aab
          retention-days: 90
