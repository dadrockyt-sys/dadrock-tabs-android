name: Translate SEO Content

on:
  workflow_dispatch:
    inputs:
      languages:
        description: "Languages to translate"
        required: false
        default: "es,pt,pt-br,de,fr,it,ja,ko,zh,ru,hi,sv,fi"
      limit:
        description: "Max artists per run"
        required: false
        default: "50"

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run SEO translations
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
          LANGUAGES: ${{ github.event.inputs.languages }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: node scripts/translate-seo-content.js

      - name: Commit translation updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update translated SEO content" || echo "No changes to commit"
          git push
