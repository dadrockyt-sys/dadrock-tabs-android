name: Fix Missing Artist SEO Slugs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Fix missing artist SEO slugs
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: node scripts/fix-missing-artist-slugs.js
