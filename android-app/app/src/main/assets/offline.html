<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DadRock Tabs - Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #09090b 0%, #18181b 50%, #09090b 100%);
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .container {
            max-width: 400px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #f59e0b;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            font-size: 16px;
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .retry-btn {
            display: inline-block;
            padding: 14px 36px;
            background: #f59e0b;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .retry-btn:active {
            background: #d97706;
        }
        .brand {
            margin-top: 48px;
            font-size: 14px;
            color: #52525b;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎸</div>
        <h1>No Internet Connection</h1>
        <p>
            Looks like you're offline. Check your Wi-Fi or mobile data 
            and try again to get back to rocking!
        </p>
        <button class="retry-btn" onclick="window.location.reload()">
            Try Again
        </button>
        <div class="brand">DADROCK TABS</div>
    </div>
</body>
</html>
